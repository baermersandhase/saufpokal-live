<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Saufpokal Live – Dashboard</title>
  <style>
    :root {
      --panel: rgba(15, 23, 42, 0.94);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #ef4444;
      --accent-2: #f97316;
      --gold: #f59e0b;
      --gold-2: #fde68a;
      --green: #22c55e;
      --red: #ef4444;
      --blue: #3b82f6;
      --blue-2: #60a5fa;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, #14203b 0%, #08101d 48%),
        linear-gradient(180deg, #08101d 0%, #050b15 100%);
      color: var(--text);
      font-family: Inter, Arial, sans-serif;
      overflow: hidden;
    }

    body {
      min-height: 100vh;
      padding: 8px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 8px;
    }

    .topbar,
    .ranking-card,
    .overlay {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 8px 10px;
      align-items: center;
    }

    .brand {
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(1.25rem, 2.2vw, 1.75rem);
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0.02em;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: clamp(0.76rem, 1vw, 0.86rem);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .pill,
    .btn {
      min-height: 36px;
      border-radius: 999px;
      padding: 0 13px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 800;
      font-size: 0.84rem;
      white-space: nowrap;
    }

    .pill {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .pill .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.16);
      flex: 0 0 auto;
    }

    .pill.closed .dot {
      background: var(--red);
      box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.16);
    }

    .pill.error .dot {
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.16);
    }

    .btn {
      border: 0;
      cursor: pointer;
      color: var(--text);
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: var(--shadow);
    }

    .btn.ghost {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      box-shadow: none;
    }

    .ranking-card {
      min-height: 0;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .ranking-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
    }

    .ranking-head h2 {
      margin: 0;
      font-size: 1rem;
    }

    .ranking-body {
      min-height: 0;
      overflow: hidden;
      padding: 10px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 10px;
    }

    .podium {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .podium-card,
    .rank-row {
      position: relative;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      overflow: hidden;
      isolation: isolate;
    }

    .podium-card {
      min-height: 150px;
      padding: 14px;
      display: grid;
      align-content: space-between;
      gap: 10px;
    }

    .podium-card::before,
    .rank-row::before {
      content: "";
      position: absolute;
      inset: -30% auto -30% -60%;
      width: 42%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
      opacity: 0;
      transform: skewX(-20deg);
      pointer-events: none;
      z-index: 0;
    }

    .podium-card > *,
    .rank-row > * {
      position: relative;
      z-index: 1;
    }

    .podium-card.rank-1 {
      background: linear-gradient(180deg, rgba(245,158,11,0.18), rgba(255,255,255,0.04));
      border-color: rgba(245, 158, 11, 0.4);
    }

    .podium-card.rank-2 {
      background: linear-gradient(180deg, rgba(148,163,184,0.14), rgba(255,255,255,0.04));
    }

    .podium-card.rank-3 {
      background: linear-gradient(180deg, rgba(251,146,60,0.15), rgba(255,255,255,0.04));
    }

    .podium-card.impact,
    .rank-row.impact {
      animation: impactGlow 3s ease;
      border-color: rgba(250, 204, 21, 0.82);
      box-shadow:
        0 0 0 2px rgba(250, 204, 21, 0.24),
        0 0 30px rgba(59,130,246,0.24),
        0 0 60px rgba(250,204,21,0.16);
    }

    .podium-card.impact::before,
    .rank-row.impact::before {
      opacity: 1;
      animation: shineSweep 0.95s ease 0s 3;
    }

    .podium-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .podium-rank {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.08);
      font-weight: 900;
      font-size: 1rem;
      flex: 0 0 auto;
    }

    .podium-name {
      font-size: 1.2rem;
      font-weight: 900;
      line-height: 1.15;
      word-break: break-word;
    }

    .podium-points {
      display: grid;
      gap: 4px;
      align-content: end;
    }

    .points-big {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 900;
      line-height: 0.95;
      text-shadow: 0 0 0 rgba(0,0,0,0);
      transition: transform 0.18s ease;
    }

    .impact .points-big,
    .impact .points-small {
      animation: pointsPulse 0.7s ease 0s 3;
    }

    .points-caption {
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .podium-bar-wrap,
    .rank-bar-wrap {
      height: 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.04);
    }

    .podium-bar,
    .rank-bar {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--blue), var(--blue-2));
      transition: width 1s ease;
      position: relative;
      overflow: hidden;
    }

    .rank-1 .podium-bar {
      background: linear-gradient(90deg, var(--gold), var(--gold-2));
    }

    .impact .podium-bar::after,
    .impact .rank-bar::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.65), transparent);
      animation: barShine 0.9s ease 0s 3;
    }

    .delta-badge {
      position: absolute;
      right: 10px;
      top: 10px;
      min-height: 28px;
      padding: 0 11px;
      border-radius: 999px;
      background: linear-gradient(135deg, #facc15, #fb7185);
      color: #111827;
      font-weight: 900;
      font-size: 0.82rem;
      display: inline-flex;
      align-items: center;
      box-shadow: 0 0 18px rgba(250,204,21,0.35);
      animation: deltaPop 1s ease 0s 2;
      z-index: 2;
    }

    .rest-list {
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      align-content: start;
      overflow: hidden;
    }

    .rank-row {
      min-height: 66px;
      padding: 10px 12px;
      display: grid;
      gap: 7px;
      align-content: space-between;
    }

    .rank-row-head {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      align-items: center;
      min-width: 0;
    }

    .row-rank {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.06);
      font-weight: 900;
      font-size: 0.9rem;
      flex: 0 0 auto;
    }

    .row-name {
      font-size: 0.95rem;
      font-weight: 900;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .row-points {
      text-align: right;
      display: grid;
      gap: 2px;
      min-width: 72px;
    }

    .points-small {
      font-size: 1.15rem;
      font-weight: 900;
      line-height: 1;
      text-shadow: 0 0 0 rgba(0,0,0,0);
      transition: transform 0.18s ease;
    }

    .empty-box {
      border: 1px dashed rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 20px;
      text-align: center;
      color: var(--muted);
      background: rgba(255,255,255,0.03);
    }

    .overlay {
      position: fixed;
      inset: 18px;
      z-index: 50;
      display: none;
      place-items: center;
      background: rgba(8, 16, 29, 0.88);
      border: 1px solid rgba(239,68,68,0.24);
      backdrop-filter: blur(10px);
    }

    .overlay.open {
      display: grid;
    }

    .overlay-box {
      text-align: center;
      display: grid;
      gap: 14px;
      max-width: 760px;
      padding: 24px;
    }

    .overlay-box h2 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1;
      font-weight: 900;
    }

    .overlay-box p {
      margin: 0;
      color: #dbeafe;
      font-size: clamp(1rem, 2vw, 1.3rem);
      line-height: 1.4;
    }

    @keyframes impactGlow {
      0% { transform: scale(1); box-shadow: 0 0 0 rgba(250,204,21,0); }
      10% { transform: scale(1.018); box-shadow: 0 0 0 4px rgba(250,204,21,0.18), 0 0 42px rgba(59,130,246,0.35); }
      24% { transform: scale(1); }
      40% { transform: scale(1.01); box-shadow: 0 0 0 6px rgba(250,204,21,0.16), 0 0 52px rgba(250,204,21,0.18); }
      100% { transform: scale(1); box-shadow: 0 0 0 rgba(250,204,21,0); }
    }

    @keyframes shineSweep {
      0% { transform: translateX(-160%) skewX(-20deg); }
      100% { transform: translateX(360%) skewX(-20deg); }
    }

    @keyframes barShine {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(220%); }
    }

    @keyframes pointsPulse {
      0% { transform: scale(1); text-shadow: 0 0 0 rgba(250,204,21,0); }
      25% { transform: scale(1.22); text-shadow: 0 0 18px rgba(250,204,21,0.48); color: #fef08a; }
      100% { transform: scale(1); text-shadow: 0 0 0 rgba(250,204,21,0); }
    }

    @keyframes deltaPop {
      0% { transform: scale(0.6) translateY(-6px); opacity: 0; }
      18% { transform: scale(1.18) translateY(0); opacity: 1; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }

    @media (max-width: 1280px) {
      .podium {
        grid-template-columns: 1fr;
      }

      .rest-list {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 980px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .top-actions {
        justify-content: flex-start;
      }

      .rest-list {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <section class="topbar">
    <div class="brand">
      <h1>Saufpokal Live</h1>
      <p id="eventNameText">Aktuelles Ranking</p>
    </div>

    <div class="top-actions">
      <div class="pill" id="statusPill">
        <span class="dot"></span>
        <span id="statusText">Live aktiv</span>
      </div>
      <div class="pill"><span>Letztes Update:</span><strong id="lastUpdateText">–</strong></div>
      <div class="pill"><span>Ende:</span><strong id="eventEndText">–</strong></div>
      <button class="btn ghost" id="soundBtn" type="button">Ton aktivieren</button>
      <button class="btn ghost" id="refreshBtn" type="button">Jetzt aktualisieren</button>
    </div>
  </section>

  <section class="ranking-card">
    <div class="ranking-head">
      <h2>Aktuelles Ranking</h2>
    </div>

    <div class="ranking-body">
      <div class="podium" id="podium"></div>
      <div class="rest-list" id="restList"></div>
    </div>
  </section>

  <section class="overlay" id="closedOverlay">
    <div class="overlay-box">
      <h2>Zählung beendet</h2>
      <p>Die Wertung ist abgeschlossen. Die Siegerehrung findet in Kürze statt.</p>
    </div>
  </section>

  <script>
    const API_BASE = "/api";
    const REFRESH_MS = 3000;

    const state = {
      soundEnabled: false,
      audioContext: null,
      settings: null,
      groups: [],
      bookings: [],
      ranking: [],
      lastSnapshot: new Map(),
      changeMap: new Map(),
      lastRefreshTime: null,
      refreshTimer: null,
      clearImpactTimer: null,
      hasError: false
    };

    const els = {
      eventNameText: document.getElementById("eventNameText"),
      statusPill: document.getElementById("statusPill"),
      statusText: document.getElementById("statusText"),
      lastUpdateText: document.getElementById("lastUpdateText"),
      eventEndText: document.getElementById("eventEndText"),
      soundBtn: document.getElementById("soundBtn"),
      refreshBtn: document.getElementById("refreshBtn"),
      podium: document.getElementById("podium"),
      restList: document.getElementById("restList"),
      closedOverlay: document.getElementById("closedOverlay")
    };

    async function init() {
      bindEvents();
      await refreshData(true);
      startAutoRefresh();
    }

    function bindEvents() {
      els.soundBtn.addEventListener("click", enableSound);
      els.refreshBtn.addEventListener("click", () => refreshData(true));
    }

    function startAutoRefresh() {
      if (state.refreshTimer) clearInterval(state.refreshTimer);
      state.refreshTimer = setInterval(() => refreshData(false), REFRESH_MS);
    }

    async function refreshData(manual) {
      try {
        const [settingsRes, groupsRes, bookingsRes] = await Promise.all([
          apiGet("/settings"),
          apiGet("/groups"),
          apiGet("/bookings")
        ]);

        state.settings = settingsRes;
        state.groups = Array.isArray(groupsRes.items) ? groupsRes.items : [];
        state.bookings = Array.isArray(bookingsRes.items) ? bookingsRes.items : [];

        const nextRanking = buildRanking(state.groups, state.bookings);
        detectChanges(nextRanking);
        state.ranking = nextRanking;
        state.lastRefreshTime = new Date();
        state.hasError = false;

        render();

        if (state.changeMap.size > 0) {
          pingSound();
          if (state.clearImpactTimer) clearTimeout(state.clearImpactTimer);
          state.clearImpactTimer = setTimeout(() => {
            state.changeMap.clear();
            render();
          }, 3100);
        }

        updateStatus();
      } catch (error) {
        console.error(error);
        state.hasError = true;
        updateStatus();
      }
    }

    function buildRanking(groups, bookings) {
      const activeGroups = [...groups]
        .filter(group => group.active)
        .sort((a, b) => a.name.localeCompare(b.name, "de"));

      const totals = new Map(activeGroups.map(group => [group.id, 0]));

      bookings
        .filter(booking => booking.status !== "cancelled")
        .forEach(booking => {
          const points = Number(booking.totalPoints || 0);
          if (totals.has(booking.groupId)) {
            totals.set(booking.groupId, totals.get(booking.groupId) + points);
          }
        });

      const ranking = activeGroups.map(group => ({
        id: group.id,
        name: group.name,
        points: totals.get(group.id) || 0
      }));

      ranking.sort((a, b) => b.points - a.points || a.name.localeCompare(b.name, "de"));
      return ranking;
    }

    function detectChanges(nextRanking) {
      const nextSnapshot = new Map();
      const changes = new Map();

      nextRanking.forEach(item => {
        nextSnapshot.set(item.id, item.points);
        const previous = state.lastSnapshot.get(item.id);
        if (previous !== undefined && previous !== item.points) {
          changes.set(item.id, {
            name: item.name,
            from: previous,
            to: item.points,
            delta: item.points - previous
          });
        }
      });

      state.lastSnapshot = nextSnapshot;
      state.changeMap = changes;
    }

    function render() {
      els.eventNameText.textContent = state.settings?.eventName || "Aktuelles Ranking";
      els.eventEndText.textContent = state.settings?.endTime || "–";
      els.lastUpdateText.textContent = state.lastRefreshTime ? formatTime(state.lastRefreshTime) : "–";
      els.soundBtn.textContent = state.soundEnabled ? "Ton aktiv" : "Ton aktivieren";
      els.closedOverlay.classList.toggle("open", state.settings?.status === "closed");

      const ranking = state.ranking;
      els.podium.innerHTML = "";
      els.restList.innerHTML = "";

      if (!ranking.length) {
        els.podium.innerHTML = `<div class="empty-box">Keine aktiven Gruppen vorhanden.</div>`;
        return;
      }

      const maxPoints = Math.max(...ranking.map(item => item.points), 1);
      const top3 = ranking.slice(0, 3);
      const rest = ranking.slice(3);

      top3.forEach((group, index) => {
        const rank = index + 1;
        const change = state.changeMap.get(group.id);
        const impact = Boolean(change);
        const width = Math.max(8, Math.round((group.points / maxPoints) * 100));

        const card = document.createElement("div");
        card.className = `podium-card rank-${rank}${impact ? " impact" : ""}`;
        card.innerHTML = `
          ${impact && change.delta !== 0 ? `<div class="delta-badge">${change.delta > 0 ? `+${change.delta}` : change.delta}</div>` : ""}
          <div class="podium-top">
            <div class="podium-rank">${rank}</div>
          </div>
          <div class="podium-name">${escapeHtml(group.name)}</div>
          <div class="podium-points">
            <div class="points-big js-points" data-from="${impact ? change.from : group.points}" data-to="${group.points}" data-delta="${impact ? Math.abs(change.delta) : 0}">${impact ? change.from : group.points}</div>
            <div class="points-caption">Punkte</div>
          </div>
          <div class="podium-bar-wrap"><div class="podium-bar" style="width:${width}%"></div></div>
        `;
        els.podium.appendChild(card);
      });

      rest.forEach((group, index) => {
        const rank = index + 4;
        const change = state.changeMap.get(group.id);
        const impact = Boolean(change);
        const width = Math.max(8, Math.round((group.points / maxPoints) * 100));

        const row = document.createElement("div");
        row.className = `rank-row${impact ? " impact" : ""}`;
        row.innerHTML = `
          ${impact && change.delta !== 0 ? `<div class="delta-badge">${change.delta > 0 ? `+${change.delta}` : change.delta}</div>` : ""}
          <div class="rank-row-head">
            <div class="row-rank">${rank}</div>
            <div class="row-name">${escapeHtml(group.name)}</div>
            <div class="row-points">
              <div class="points-small js-points" data-from="${impact ? change.from : group.points}" data-to="${group.points}" data-delta="${impact ? Math.abs(change.delta) : 0}">${impact ? change.from : group.points}</div>
              <div class="points-caption">Punkte</div>
            </div>
          </div>
          <div class="rank-bar-wrap"><div class="rank-bar" style="width:${width}%"></div></div>
        `;
        els.restList.appendChild(row);
      });

      runPointAnimations();
    }

    function runPointAnimations() {
      document.querySelectorAll(".js-points").forEach(el => {
        const from = Number(el.dataset.from || 0);
        const to = Number(el.dataset.to || 0);
        const delta = Number(el.dataset.delta || 0);
        if (from === to) {
          el.textContent = String(to);
          return;
        }
        animateCounter(el, from, to, delta);
      });
    }

    function animateCounter(el, from, to, delta) {
      const range = Math.abs(to - from);
      const duration = Math.min(2600, Math.max(900, range * 18));
      const start = performance.now();

      function frame(now) {
        const progress = Math.min(1, (now - start) / duration);
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = Math.round(from + (to - from) * eased);
        el.textContent = String(current);
        if (progress < 1) {
          requestAnimationFrame(frame);
        } else {
          el.textContent = String(to);
          if (delta >= 50) {
            el.style.transform = "scale(1.18)";
            setTimeout(() => { el.style.transform = "scale(1)"; }, 180);
          }
        }
      }

      requestAnimationFrame(frame);
    }

    function updateStatus() {
      els.statusPill.classList.remove("closed", "error");

      if (state.hasError) {
        els.statusText.textContent = "Verbindung gestört";
        els.statusPill.classList.add("error");
        return;
      }

      if (state.settings?.status === "closed") {
        els.statusText.textContent = "Zählung beendet";
        els.statusPill.classList.add("closed");
        return;
      }

      els.statusText.textContent = "Live aktiv";
    }

    async function enableSound() {
      try {
        if (!state.audioContext) {
          state.audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (state.audioContext.state === "suspended") {
          await state.audioContext.resume();
        }
        state.soundEnabled = true;
        pingSound();
        render();
      } catch (error) {
        console.error(error);
      }
    }

    function pingSound() {
      if (!state.soundEnabled || !state.audioContext || state.changeMap.size === 0) return;

      const maxDelta = Math.max(...[...state.changeMap.values()].map(item => Math.abs(item.delta || 0)), 1);
      const ctx = state.audioContext;
      const now = ctx.currentTime;
      const osc1 = ctx.createOscillator();
      const osc2 = ctx.createOscillator();
      const gain = ctx.createGain();

      osc1.type = "sine";
      osc2.type = "triangle";
      osc1.frequency.setValueAtTime(maxDelta >= 50 ? 740 : 880, now);
      osc1.frequency.exponentialRampToValueAtTime(maxDelta >= 50 ? 1480 : 1320, now + 0.12);
      osc2.frequency.setValueAtTime(maxDelta >= 50 ? 1110 : 1320, now);
      osc2.frequency.exponentialRampToValueAtTime(maxDelta >= 50 ? 2220 : 1760, now + 0.12);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(maxDelta >= 50 ? 0.12 : 0.09, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + (maxDelta >= 50 ? 0.32 : 0.22));

      osc1.connect(gain);
      osc2.connect(gain);
      gain.connect(ctx.destination);
      osc1.start(now);
      osc2.start(now + 0.01);
      osc1.stop(now + (maxDelta >= 50 ? 0.32 : 0.22));
      osc2.stop(now + (maxDelta >= 50 ? 0.32 : 0.22));
    }

    async function apiGet(path) {
      const res = await fetch(`${API_BASE}${path}`);
      if (!res.ok) throw new Error(`GET ${path} fehlgeschlagen: ${res.status}`);
      return res.json();
    }

    function formatTime(date) {
      return date.toLocaleTimeString("de-DE", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    init();
  </script>
</body>
